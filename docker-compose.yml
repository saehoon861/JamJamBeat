services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: jamjam-backend
    ports:
      - "8008:8008"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8008/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_MODEL_ENDPOINT: /infer
    container_name: jamjam-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3003:80"
    restart: unless-stopped
