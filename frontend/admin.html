<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JamJam Beat - 관리자 모드</title>
  <link rel="stylesheet" href="./src/styles/main.css?v=5" />
</head>

<body>
  <main class="scene hide-camera" data-mode="calm" data-fever="off">
    <section class="layer layer-background" aria-hidden="true">
      <div class="bg-video-wrap" aria-hidden="true">
        <video class="bg-video bg-video-a" muted playsinline preload="auto" autoplay loop>
          <source src="/public/assets/forest_cinemagraph.webm" type="video/webm" />
          <source src="/public/assets/forest_cinemagraph.mp4" type="video/mp4" />
        </video>
        <video class="bg-video bg-video-b" muted playsinline preload="auto" autoplay loop>
          <source src="/public/assets/forest_cinemagraph.webm" type="video/webm" />
          <source src="/public/assets/forest_cinemagraph.mp4" type="video/mp4" />
        </video>
      </div>
    </section>

    <section class="admin-shell">
      <h1>관리자 모드 - 오브젝트 위치 조정</h1>
      <p>슬라이더로 위치를 조정하고 저장하면 시작 화면에 바로 반영됩니다.</p>

      <div class="admin-row">
        <div class="admin-panel admin-preview">
          <div id="adminStage" class="admin-stage">
            <div id="admin-drum" class="admin-inst" aria-label="고슴도치 드럼">
              <img src="/public/assets/objects/hedgehog-drum.png" alt="" />
            </div>
            <div id="admin-xylophone" class="admin-inst" aria-label="노래하는 백합">
              <img src="/public/assets/objects/lily-melody.png" alt="" />
            </div>
            <div id="admin-tambourine" class="admin-inst" aria-label="행운 클로버">
              <img src="/public/assets/objects/clover-chime.png" alt="" />
            </div>
          </div>
        </div>

        <div class="admin-panel admin-controls">
          <label>고슴도치 드럼 X (vw)
            <input id="drum-x" type="range" min="0" max="90" step="1" />
          </label>
          <label>고슴도치 드럼 Y (vh)
            <input id="drum-y" type="range" min="0" max="80" step="1" />
          </label>

          <label>노래하는 백합 X (vw)
            <input id="xylophone-x" type="range" min="0" max="90" step="1" />
          </label>
          <label>노래하는 백합 Y (vh)
            <input id="xylophone-y" type="range" min="0" max="80" step="1" />
          </label>

          <label>행운 클로버 X (vw)
            <input id="tambourine-x" type="range" min="0" max="90" step="1" />
          </label>
          <label>행운 클로버 Y (vh)
            <input id="tambourine-y" type="range" min="0" max="80" step="1" />
          </label>

          <div class="admin-actions">
            <button id="saveLayout" class="admin-save" type="button">저장</button>
            <button id="resetLayout" class="admin-reset" type="button">기본값</button>
            <a class="admin-back" href="javascript:history.back()">뒤로가기</a>
            <a class="admin-back" href="./index.html">메인화면으로</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="./src/js/admin.js?v=1"></script>
</body>

</html>
