<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JamJam Beat - 매칭 설정</title>
  <link rel="icon" href="/assets/로고.png" type="image/png" />
  <link rel="stylesheet" href="./src/styles/main.css?v=6" />
</head>

<body>
  <main class="scene scene-scroll hide-camera" data-mode="calm" data-fever="off">
    <section class="layer layer-background" aria-hidden="true">
      <div class="bg-video-wrap" aria-hidden="true">
        <video class="bg-video bg-video-a is-active" muted playsinline preload="auto" autoplay loop>
          <source src="/assets/forest_cinemagraph.mp4" type="video/mp4" />
        </video>
        <video class="bg-video bg-video-b is-preload" muted playsinline preload="auto" autoplay loop>
          <source src="/assets/forest_cinemagraph.mp4" type="video/mp4" />
        </video>
      </div>
    </section>

    <section class="mapping-shell">
      <div class="mapping-header">
        <h1>소리/손동작/오브젝트 매칭</h1>
        <p>매칭 페이지에서는 내장 Web Audio 사운드만 오브젝트 소리로 연결합니다.</p>
      </div>

      <div class="mapping-grid">
        <section class="mapping-panel">
          <h2>오브젝트 -> 소리</h2>

          <div class="sound-mapping-group">
            <div class="sound-mapping-header">
              <video src="/assets/objects/고슴도치1.mov" class="object-thumbnail" autoplay muted loop playsinline preload="auto" aria-hidden="true"></video>
              <label>고슴도치 드럼</label>
            </div>
            <select id="sound-drum"></select>
            <button id="test-drum" class="test-sound-btn" type="button">테스트</button>
          </div>

          <div class="sound-mapping-group">
            <div class="sound-mapping-header">
              <video src="/assets/objects/고슴도치1.mov" class="object-thumbnail" autoplay muted loop playsinline preload="auto" aria-hidden="true"></video>
              <label>아기 사슴</label>
            </div>
            <select id="sound-xylophone"></select>
            <button id="test-xylophone" class="test-sound-btn" type="button">테스트</button>
          </div>

          <div class="sound-mapping-group">
            <div class="sound-mapping-header">
              <video src="/assets/objects/고슴도치1.mov" class="object-thumbnail" autoplay muted loop playsinline preload="auto" aria-hidden="true"></video>
              <label>아기 토끼</label>
            </div>
            <select id="sound-tambourine"></select>
            <button id="test-tambourine" class="test-sound-btn" type="button">테스트</button>
          </div>

          <div class="sound-mapping-group">
            <div class="sound-mapping-header">
              <video src="/assets/objects/고슴도치2.mov" class="object-thumbnail" autoplay muted loop playsinline preload="auto" aria-hidden="true"></video>
              <label>다람쥐</label>
            </div>
            <select id="sound-a"></select>
            <button id="test-a" class="test-sound-btn" type="button">테스트</button>
          </div>

          <div class="sound-mapping-group">
            <div class="sound-mapping-header">
              <img src="/assets/objects/고양이.png" class="object-thumbnail" alt="" aria-hidden="true" />
              <label>고양이</label>
            </div>
            <select id="sound-cat"></select>
            <button id="test-cat" class="test-sound-btn" type="button">테스트</button>
          </div>

          <div class="sound-mapping-group">
            <div class="sound-mapping-header">
              <img src="/assets/objects/팽귄.png" class="object-thumbnail" alt="" aria-hidden="true" />
              <label>팽귄</label>
            </div>
            <select id="sound-penguin"></select>
            <button id="test-penguin" class="test-sound-btn" type="button">테스트</button>
          </div>
        </section>

        <section class="mapping-panel">
          <h2>손동작 -> 오브젝트</h2>

          <div class="gesture-mapping-group">
            <label for="gesture-fist">주먹</label>
            <select id="gesture-fist"></select>
          </div>
          <div class="gesture-mapping-group">
            <label for="gesture-openpalm">손바닥</label>
            <select id="gesture-openpalm"></select>
          </div>
          <div class="gesture-mapping-group">
            <label for="gesture-v">브이</label>
            <select id="gesture-v"></select>
          </div>
          <div class="gesture-mapping-group">
            <label for="gesture-pinky">새끼손가락</label>
            <select id="gesture-pinky"></select>
          </div>
          <div class="gesture-mapping-group">
            <label for="gesture-animal">애니멀</label>
            <select id="gesture-animal"></select>
          </div>
          <div class="gesture-mapping-group">
            <label for="gesture-kheart">K-하트</label>
            <select id="gesture-kheart"></select>
          </div>
        </section>
      </div>

      <div class="mapping-actions">
        <button id="saveMappingButton" class="admin-save" type="button">저장</button>
        <button id="resetMappingButton" class="admin-reset" type="button">기본값</button>
        <a class="admin-back" href="./index.html">메인화면으로</a>
      </div>
    </section>
  </main>

  <script type="module" src="./src/js/mapping_admin.js"></script>
</body>

</html>
