<!doctype html>
<!-- 이 문서는 HTML5 형식으로 작성되었다는 선언입니다. -->
<html lang="ko">
<!-- lang="ko" 는 이 페이지의 기본 언어가 한국어라는 뜻입니다. -->

<head>
  <!-- 문자 인코딩을 UTF-8로 설정해 한글이 깨지지 않게 합니다. -->
  <meta charset="UTF-8" />
  <!-- 휴대폰 화면에서도 크기가 자연스럽게 맞도록 뷰포트 설정을 합니다. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- 브라우저 탭에 표시될 페이지 이름입니다. -->
  <title>JamJam Beat - Forest Mode Select</title>
  <!-- 브라우저 탭 옆에 보이는 작은 아이콘(파비콘) 파일입니다. -->
  <link rel="icon" href="/assets/objects/squirrel-effect.png" type="image/png" />
  <!-- 이 페이지의 색상, 배치, 애니메이션 등을 담당하는 CSS 파일을 불러옵니다. -->
  <link rel="stylesheet" href="./src/styles/main.css?v=6" />
</head>

<body>
  <!-- main은 이 페이지의 핵심 내용을 감싸는 영역입니다. -->
  <main class="scene theme-scene hide-camera" aria-live="polite">
    <!-- 배경 영상, 안개, 숲 실루엣처럼 장식용 배경을 모아둔 구역입니다. -->
    <section class="layer layer-background" aria-hidden="true">
      <!-- 배경 영상을 담는 상자입니다. -->
      <div class="bg-video-wrap" aria-hidden="true">
        <!-- 첫 번째 배경 영상입니다. 음소거 상태로 자동 재생되고 반복됩니다. -->
        <video class="bg-video bg-video-a is-active" muted playsinline preload="auto" autoplay loop>
          <!-- 실제 재생할 mp4 파일 경로입니다. -->
          <source src="/assets/forest_cinemagraph.mp4" type="video/mp4" />
        </video>
        <!-- 두 번째 배경 영상입니다. 화면 전환이나 겹침 효과를 위해 같은 영상을 하나 더 둔 구조입니다. -->
        <video class="bg-video bg-video-b is-preload" muted playsinline preload="auto" autoplay loop>
          <!-- 위와 같은 숲 영상 파일을 다시 연결합니다. -->
          <source src="/assets/forest_cinemagraph.mp4" type="video/mp4" />
        </video>
      </div>
      <!-- SVG는 그림을 코드로 그리는 방식입니다. 여기서는 숲 하늘과 지형 실루엣을 만듭니다. -->
      <svg class="forest-silhouette" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMax slice" role="img">
        <!-- 접근성용 제목으로, 화면 읽기 도구가 이 그림의 의미를 알 수 있게 합니다. -->
        <title>Mode selection forest background</title>
        <defs>
          <!-- 위에서 아래로 색이 자연스럽게 바뀌는 그라데이션 정의입니다. -->
          <linearGradient id="themeSkyGrad" x1="0" y1="0" x2="0" y2="1">
            <!-- 그라데이션 시작 색입니다. -->
            <stop offset="0%" stop-color="#1c1938" />
            <!-- 그라데이션 끝 색입니다. -->
            <stop offset="100%" stop-color="#183a32" />
          </linearGradient>
        </defs>
        <!-- 화면 전체를 채우는 하늘 배경 사각형입니다. -->
        <rect width="1600" height="900" fill="url(#themeSkyGrad)"></rect>
        <!-- 아래쪽 숲 지형처럼 보이는 물결 모양 실루엣입니다. -->
        <path d="M0 710 Q160 610 360 700 T760 710 T1200 695 T1600 710 L1600 900 L0 900 Z" fill="#101a27"></path>
      </svg>
      <!-- 안개 효과용 레이어 1입니다. -->
      <div class="fog fog-a"></div>
      <!-- 안개 효과용 레이어 2입니다. -->
      <div class="fog fog-b"></div>
    </section>

    <!-- 사용자가 실제로 보고 누르는 메뉴 영역입니다. -->
    <section class="theme-shell">
      <!-- 이전 화면(숲 입구)으로 돌아가는 링크입니다. -->
      <a id="themeBackButton" class="theme-back-link" href="./index.html">← 숲 입구로</a>
      <!-- 페이지의 가장 큰 제목입니다. -->
      <h1>숲 무드 선택</h1>
      <!-- 사용자에게 조작 방법을 짧게 안내하는 설명 문구입니다. -->
      <p class="theme-sub">손 커서를 카드 위에 잠깐 올리면 시작됩니다.</p>
      <!-- 현재 상태를 알려주는 문구입니다. 자바스크립트가 내용을 바꿔줄 수 있습니다. -->
      <p id="themeStatus" class="theme-status">카메라에 손을 보여주세요.</p>
      <!-- 빠르게 메인 화면으로 이동할 수 있는 링크 모음 영역입니다. -->
      <div class="theme-quick-nav">
        <!-- 메인 화면으로 이동하는 링크입니다. -->
        <a class="theme-main-link" href="./index.html">메인 화면으로</a>
      </div>

      <!-- 여러 개의 테마 카드를 가로/세로 배치로 묶는 영역입니다. -->
      <div class="theme-mode-grid">
        <!-- 첫 번째 테마 선택 버튼입니다. -->
        <!-- data-nav 안의 주소는 이 버튼이 선택됐을 때 이동할 목적지입니다. -->
        <button class="theme-mode-card" type="button" data-nav="./index.html?session=start&mode=calm">
          <!-- 카드 왼쪽의 작은 색상 표시 점입니다. -->
          <span class="theme-chip calm"></span>
          <!-- 카드의 대표 제목입니다. -->
          <strong>고요한 숲</strong>
          <!-- 카드의 분위기를 짧게 설명하는 보조 문구입니다. -->
          <small>차분한 보라-초록 톤</small>
        </button>
        <!-- 두 번째 테마 선택 버튼입니다. -->
        <button class="theme-mode-card" type="button" data-nav="./index.html?session=start&mode=magic">
          <!-- 이 테마를 구분하는 색상 표시 점입니다. -->
          <span class="theme-chip magic"></span>
          <!-- 카드 제목입니다. -->
          <strong>마법 숲</strong>
          <!-- 카드 분위기를 설명하는 짧은 문장입니다. -->
          <small>빛나는 민트-골드 톤</small>
        </button>
      </div>
    </section>

    <!-- 화면 아래쪽 등 공통 위치에 보여줄 수 있는 메인 이동 링크입니다. -->
    <a class="global-main-link" href="./index.html">메인화면으로</a>

    <!-- 사용자의 웹캠 영상을 받아오는 비디오 요소입니다. -->
    <!-- 보통 자바스크립트가 카메라 영상을 여기 연결하고, CSS로 숨기거나 위치를 조정합니다. -->
    <video id="webcam" autoplay playsinline muted></video>
    <!-- 손 인식 결과나 보조 그래픽을 그릴 수 있는 캔버스 영역입니다. -->
    <canvas id="handCanvas"></canvas>
    <!-- 손 위치를 커서처럼 보여주는 시각 요소입니다. -->
    <div id="handCursor" class="hand-cursor" aria-hidden="true"></div>
  </main>

  <!-- 이 페이지의 실제 동작(카메라 연결, 손 추적, 카드 선택 처리 등)을 담당하는 자바스크립트 파일입니다. -->
  <script type="module" src="./src/js/theme.js?v=5"></script>
</body>

</html>
