# agent_config.yaml - default autonomous experiment-agent configuration for JamJamBeat
version: 1

goal:
  test_accuracy: 0.93
  test_macro_f1: 0.93

reporting:
  periodic_every_completed_trials: 10
  champion_report_enabled: true
  full_report_recent_trials: 10

diagnostics:
  collect_proc_diskstats: false
  collect_iostat: false

backoff:
  schedule_seconds: [60, 300, 900, 3600, 10800, 21600, 43200, 86400]
  max_seconds: 86400

retention:
  keep_recent_non_champions: 20

search:
  seed: 42
  parallel_workers: 2
  max_parallel_heavy: 1
  max_parallel_medium: 2
  tpe_n_startup_trials: 12
  tpe_multivariate: false
  sigkill_retry_once: true
  sigkill_cooldown_trials: 12
  phase_trial_budgets:
    broad_search: 36
    refinement: 14
    grid_search: 12
    mutation_search: 8
  broad_top_k_context: 8
  max_consecutive_same_model: 2
  max_consecutive_same_scenario: 2

scenarios:
  auto_discover: true
  use_existing_root: true
  use_augmented_frame: true
  use_augmented_sequence: false
  family_locked_pairing: true

models:
  role_based:
    - frame_spatial_transformer
  explicit_train_test:
    - edge_stgu_mlp
    - sparse_masked_mlp
    - hierarchical_tree_mlp
    - lappe_dist_mixer

hyperparameters:
  common:
    epochs: [16, 20, 24]
    batch_size: [16, 32, 64, 128]
    lr: [0.0003, 0.0005, 0.001]
    weight_decay: [0.0001, 0.001, 0.005]
    patience: [4, 6]
    loss_type: ["focal", "cross_entropy"]
    use_weighted_sampler: [true]
    use_alpha: [false]
    use_label_smoothing: [true]
    label_smoothing: [0.05, 0.1]
    focal_gamma: [1.5, 2.0]
    optimizer: ["adamw", "adam"]
    momentum: [0.9]
    tau: [0.5]
    vote_n: [1]
    debounce_k: [1]
    fallback_fps: [30.0]

mutation:
  enabled: true
  max_consecutive_failures_before_golden_reset: 3
  allowed_globs:
    - model/model_pipelines/*/model.py
    - model/model_pipelines/*/dataset.py
    - model/model_pipelines/_shared.py
    - model/model_pipelines/run_pipeline.py
    - model/model_pipelines/new_run_pipeline.py
